name: Update Checker

on:
  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 minutes

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Fetch content
        run: |
          wget -q -O fetched_content.html https://lite.duckduckgo.com/lite/?q=hecker

      - name: Check for changes
        run: |
          if [ ! -f existing_content.html ]; then
            echo "File does not exist, moving fetched content."
            mv fetched_content.html existing_content.html
          elif ! diff -q existing_content.html fetched_content.html > /dev/null; then
            echo "Content has changed, updating the file."
            mv fetched_content.html existing_content.html
          else
            echo "No changes detected."
            exit 0
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add existing_content.html
          git commit -m "Update content from DuckDuckGo"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
